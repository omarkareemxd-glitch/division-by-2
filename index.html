<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Converter & Visual Tutorial</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --card-bg: rgba(18, 24, 40, 0.8);
            --accent: #4f8cff;
            --accent2: #ff5399;
            --text: #f0f4ff;
            --muted: #9aa4bf;
            --border: rgba(255,255,255,0.08);
            --input-bg: rgba(10,15,25,0.9);
            --hover: rgba(79,140,255,0.1);
            --ring: rgba(79,140,255,0.4);
            --warning: #ffb347;
            --success: #34d399;
            --radius: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(79,140,255,0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,83,153,0.07) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text);
            transition: all 0.3s ease;
        }

        body.rtl { direction: rtl; }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 36px 32px;
            width: 100%;
            max-width: 1000px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset;
            display: flex;
            flex-direction: column;
            gap: 28px;
            max-height: 95vh;
            overflow-y: auto;
        }
        .container::-webkit-scrollbar { width: 6px; }
        .container::-webkit-scrollbar-track { background: transparent; }
        .container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            color: var(--muted);
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }
        .badge .name { color: white; font-weight: 600; }
        .badge .college-link { color: var(--accent); font-weight: 600; text-decoration: none; transition: color 0.2s; cursor: pointer; }
        .badge .college-link:hover { color: var(--accent2); text-decoration: underline; }

        .lang-switch {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            letter-spacing: 0.3px;
        }
        .lang-switch:hover { background: var(--hover); border-color: var(--accent); color: var(--accent); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(79,140,255,0.15); }

        .converter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 18px;
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
        .input-group label i { font-size: 0.9rem; color: var(--accent); }

        .input-group input {
            width: 100%;
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
            transition: all var(--transition);
            outline: none;
            backdrop-filter: blur(5px);
        }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--ring), 0 0 20px rgba(79,140,255,0.2); background: rgba(20,30,50,0.95); }
        .input-group input.pop-effect { animation: pop 0.3s ease; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.03); background: rgba(79,140,255,0.15); } 100% { transform: scale(1); } }

        .steps-title {
            font-weight: 700;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .steps-title i { color: var(--accent); font-size: 1.2rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 0.9; } }

        .steps-container { display: flex; flex-direction: column; gap: 10px; }
        .step-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 14px 18px;
            transition: all 0.4s ease;
            animation: slideFade 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
            backdrop-filter: blur(5px);
        }
        .step-card:hover { background: rgba(79,140,255,0.08); border-color: var(--accent); transform: translateX(6px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        @keyframes slideFade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .step-num { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-weight: 800; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; box-shadow: 0 4px 12px rgba(79,140,255,0.4); }
        .step-expression { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; color: #cbd5e1; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .step-expression .val { color: var(--accent); font-weight: 700; }
        .step-expression .frac-text { color: #ff6b9d; font-weight: 500; font-size: 0.8rem; margin-left: 6px; }
        .step-remainder { background: rgba(20,30,40,0.7); border: 1px solid var(--warning); border-radius: 10px; padding: 6px 14px; text-align: center; min-width: 60px; backdrop-filter: blur(5px); }
        .step-remainder .rem-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .step-remainder .rem-value { font-size: 1.2rem; font-weight: 800; color: var(--warning); }

        .empty-message { color: var(--muted); text-align: center; padding: 20px; font-style: italic; opacity: 0.8; }

        /* Tutorial Section – professional icons instead of emojis */
        .tutorial-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 700;
            color: var(--muted);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            user-select: none;
            transition: color 0.2s;
        }
        .tutorial-toggle:hover { color: var(--accent); }
        .tutorial-toggle i { transition: transform 0.3s; }
        .tutorial-toggle.open i { transform: rotate(180deg); }

        .tutorial-content {
            display: none;
            flex-direction: column;
            gap: 20px;
            animation: fadeSlideIn 0.4s ease;
        }
        .tutorial-content.show { display: flex; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .tutorial-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tutorial-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .tutorial-btn:hover { background: var(--hover); border-color: var(--accent); color: var(--accent); }
        .tutorial-btn.active { background: var(--accent); color: #0a0e17; border-color: var(--accent); font-weight: 700; }

        .tutorial-display {
            background: rgba(10,15,25,0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            font-family: 'JetBrains Mono', monospace;
            min-height: 200px;
            animation: fadeSlideIn 0.3s ease;
        }
        .tutorial-display .step-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            flex-wrap: wrap;
            animation: slideFade 0.4s ease forwards;
            opacity: 0;
        }
        .tutorial-display .weight-table {
            display: inline-flex;
            gap: 4px;
            margin: 8px 12px;
        }
        .tutorial-display .weight-cell {
            background: rgba(79,140,255,0.15);
            border: 1px solid rgba(79,140,255,0.3);
            border-radius: 8px;
            padding: 6px 10px;
            text-align: center;
            font-weight: 700;
            color: var(--accent);
            min-width: 36px;
        }
        .tutorial-display .weight-cell.header { background: rgba(255,83,153,0.2); border-color: rgba(255,83,153,0.4); color: var(--accent2); }
        .tutorial-display .digit-cell {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 6px 10px;
            text-align: center;
            font-weight: 700;
            color: #fff;
            min-width: 36px;
            transition: all 0.3s;
        }
        .tutorial-display .digit-cell.highlight { background: var(--accent); color: #0a0e17; border-color: var(--accent); }
        .tutorial-display .arrow { color: var(--accent2); font-weight: 800; font-size: 1.2rem; }
        .tutorial-display .result-box {
            display: inline-block;
            background: rgba(52,211,153,0.2);
            border: 1px solid var(--success);
            border-radius: 10px;
            padding: 8px 16px;
            color: var(--success);
            font-weight: 800;
            font-size: 1.1rem;
        }
        .tutorial-display .group-bracket {
            display: inline-flex;
            border: 2px dashed var(--warning);
            border-radius: 10px;
            padding: 6px 10px;
            gap: 4px;
            margin: 4px;
        }

        @media (max-width: 600px) {
            .container { padding: 24px 16px; }
            .converter-grid { grid-template-columns: 1fr 1fr; }
            .tutorial-display { padding: 16px; }
        }
    </style>
</head>
<body class="rtl">

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="title-section">
            <h1 data-lang="title">Repeated Division by 2</h1>
        </div>
        <div class="badge">
            <i class="fas fa-user" style="color: var(--accent);"></i>
            <span class="name" data-lang="devName">Omar Karim Abdalsalam</span>
            <span>|</span>
            <i class="fas fa-university" style="color: var(--accent);"></i>
            <a href="https://ci.suez.edu.eg/" target="_blank" rel="noopener noreferrer" class="college-link" data-lang="devCollege">SCU-FCI</a>
        </div>
        <button class="lang-switch" id="langToggle">
            <i class="fas fa-globe"></i> <span data-lang="langLabel">AR</span>
        </button>
    </div>

    <!-- Converter Grid -->
    <div class="converter-grid">
        <div class="input-group">
            <label><i class="fas fa-sort-numeric-down"></i> <span data-lang="decimal">Decimal</span></label>
            <input type="text" id="decInput" placeholder="0" autocomplete="off" class="num-input" inputmode="numeric">
        </div>
        <div class="input-group">
            <label><i class="fas fa-circle"></i> <span data-lang="binary">Binary</span></label>
            <input type="text" id="binInput" placeholder="0" autocomplete="off" class="num-input">
        </div>
        <div class="input-group">
            <label><i class="fas fa-hashtag"></i> <span data-lang="octal">Octal</span></label>
            <input type="text" id="octInput" placeholder="0" autocomplete="off" class="num-input">
        </div>
        <div class="input-group">
            <label><i class="fas fa-code"></i> <span data-lang="hex">Hexadecimal</span></label>
            <input type="text" id="hexInput" placeholder="0" autocomplete="off" class="num-input">
        </div>
    </div>

    <!-- Division Steps -->
    <div>
        <div class="steps-title"><i class="fas fa-list-ol"></i> <span data-lang="stepsTitle">Division Steps (ignore fraction → 1)</span></div>
        <div class="steps-container" id="stepsContainer"><div class="empty-message" data-lang="emptySteps">Enter a number to see the steps</div></div>
    </div>

    <!-- Interactive Tutorial Section (Manual Conversion) -->
    <div>
        <div class="tutorial-toggle" id="tutorialToggle">
            <i class="fas fa-chevron-down"></i>
            <i class="fas fa-chalkboard-teacher" style="color: var(--accent);"></i>
            <span data-lang="tutorialTitle">Manual Conversion Tutorial</span>
        </div>
        <div class="tutorial-content" id="tutorialContent">
            <div class="tutorial-buttons" id="tutorialButtons">
                <button class="tutorial-btn active" data-mode="bin2oct">Binary → Octal</button>
                <button class="tutorial-btn" data-mode="oct2bin">Octal → Binary</button>
                <button class="tutorial-btn" data-mode="bin2hex">Binary → Hexadecimal</button>
                <button class="tutorial-btn" data-mode="hex2bin">Hexadecimal → Binary</button>
                <button class="tutorial-btn" data-mode="dec2bin">Decimal → Binary</button>
                <button class="tutorial-btn" data-mode="bin2dec">Binary → Decimal</button>
            </div>
            <div class="tutorial-display" id="tutorialDisplay"></div>
        </div>
    </div>
</div>

<script>
    (() => {
        // ---------- TRANSLATIONS ----------
        const t = {
            en: {
                title: "Repeated Division by 2",
                decimal: "Decimal", binary: "Binary", octal: "Octal", hex: "Hexadecimal",
                stepsTitle: "Division Steps (ignore fraction produces 1)",
                emptySteps: "Enter a number to see the steps",
                langLabel: "AR",
                fractionIgnored: "Fraction ignored",
                noFraction: "No fraction",
                recordedRemainder: "Recorded remainder",
                devName: "Omar Karim Abdalsalam",
                devCollege: "SCU-FCI",
                tutorialTitle: "Manual Conversion Tutorial",
                bin2oct: "Binary → Octal",
                oct2bin: "Octal → Binary",
                bin2hex: "Binary → Hexadecimal",
                hex2bin: "Hexadecimal → Binary",
                dec2bin: "Decimal → Binary",
                bin2dec: "Binary → Decimal",
                weight421: "4-2-1",
                weight8421: "8-4-2-1",
                step: "Step",
                group: "Group",
                result: "Result",
                noTutorialData: "Please enter a valid number first to see the tutorial."
            },
            ar: {
                title: "القسمة المتكررة على 2",
                decimal: "عشري", binary: "ثنائي", octal: "ثماني", hex: "ست عشري",
                stepsTitle: "خطوات القسمة (تجاهل الكسر ينتج 1)",
                emptySteps: "أدخل رقماً لرؤية الخطوات",
                langLabel: "EN",
                fractionIgnored: "تم تجاهل الكسر",
                noFraction: "لا كسر",
                recordedRemainder: "الباقي المسجل",
                devName: "عمر كريم عبد السلام",
                devCollege: "SCU-FCI",
                tutorialTitle: "شرح التحويل اليدوي",
                bin2oct: "ثنائي → ثماني",
                oct2bin: "ثماني → ثنائي",
                bin2hex: "ثنائي → ست عشري",
                hex2bin: "ست عشري → ثنائي",
                dec2bin: "عشري → ثنائي",
                bin2dec: "ثنائي → عشري",
                weight421: "4-2-1",
                weight8421: "8-4-2-1",
                step: "الخطوة",
                group: "مجموعة",
                result: "الناتج",
                noTutorialData: "الرجاء إدخال رقم صحيح أولاً لعرض الشرح."
            }
        };

        // ---------- STATE ----------
        let currentLang = localStorage.getItem('lang') || 'en';
        let currentDecimal = null;
        let isUpdating = false;
        let debounceTimer;
        let tutorialMode = 'bin2oct';

        // DOM
        const decInput = document.getElementById('decInput');
        const binInput = document.getElementById('binInput');
        const octInput = document.getElementById('octInput');
        const hexInput = document.getElementById('hexInput');
        const stepsContainer = document.getElementById('stepsContainer');
        const langToggle = document.getElementById('langToggle');
        const allInputs = [decInput, binInput, octInput, hexInput];
        const tutorialToggle = document.getElementById('tutorialToggle');
        const tutorialContent = document.getElementById('tutorialContent');
        const tutorialDisplay = document.getElementById('tutorialDisplay');
        const tutorialButtons = document.getElementById('tutorialButtons');

        // ---------- LANGUAGE ----------
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = lang;
            document.body.classList.toggle('rtl', lang === 'ar');
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (t[lang] && t[lang][key]) el.textContent = t[lang][key];
            });
            document.querySelector('.badge .name').textContent = t[lang].devName;
            document.querySelector('.badge .college-link').textContent = t[lang].devCollege;
            // Update tutorial button texts
            document.querySelectorAll('.tutorial-btn').forEach(btn => {
                const mode = btn.dataset.mode;
                if (t[lang][mode]) btn.textContent = t[lang][mode];
            });
            updateStepsUI();
            renderTutorial();
        }

        langToggle.addEventListener('click', () => setLanguage(currentLang === 'en' ? 'ar' : 'en'));

        // ---------- HELPERS ----------
        const isValid = {
            bin: (s) => /^[01]+$/.test(s),
            oct: (s) => /^[0-7]+$/.test(s),
            hex: (s) => /^[0-9a-fA-F]+$/.test(s)
        };

        function parseInput(str, type) {
            const clean = str.trim();
            if (clean === '') return null;
            switch (type) {
                case 'dec': { const n = parseInt(clean, 10); return isNaN(n) ? NaN : n; }
                case 'bin': return isValid.bin(clean) ? parseInt(clean, 2) : NaN;
                case 'oct': return isValid.oct(clean) ? parseInt(clean, 8) : NaN;
                case 'hex': return isValid.hex(clean) ? parseInt(clean, 16) : NaN;
                default: return NaN;
            }
        }

        function clearAllFields() { decInput.value = ''; binInput.value = ''; octInput.value = ''; hexInput.value = ''; }
        function fillAllFields(dec) {
            decInput.value = dec.toString(10);
            binInput.value = dec.toString(2);
            octInput.value = dec.toString(8);
            hexInput.value = dec.toString(16).toUpperCase();
        }

        function updateAllFieldsExcept(sourceId) {
            isUpdating = true;
            if (currentDecimal === null) { clearAllFields(); updateStepsUI(); renderTutorial(); isUpdating = false; return; }
            const dec = currentDecimal;
            if (sourceId !== 'decInput') { decInput.value = dec.toString(10); triggerPop(decInput); }
            if (sourceId !== 'binInput') { binInput.value = dec.toString(2); triggerPop(binInput); }
            if (sourceId !== 'octInput') { octInput.value = dec.toString(8); triggerPop(octInput); }
            if (sourceId !== 'hexInput') { hexInput.value = dec.toString(16).toUpperCase(); triggerPop(hexInput); }
            isUpdating = false;
            updateStepsUI();
            renderTutorial();
        }

        function triggerPop(input) { input.classList.add('pop-effect'); setTimeout(() => input.classList.remove('pop-effect'), 300); }

        // ---------- INPUT HANDLING ----------
        function handleChange(e) {
            if (isUpdating) return;
            const src = e.target;
            const typeMap = { decInput: 'dec', binInput: 'bin', octInput: 'oct', hexInput: 'hex' };
            const type = typeMap[src.id];
            const val = parseInput(src.value, type);
            if (val === null) { currentDecimal = null; updateAllFieldsExcept(src.id); return; }
            if (isNaN(val) || val < 0) { updateAllFieldsExcept(null); return; }
            currentDecimal = Math.min(val, 1_000_000_000);
            updateAllFieldsExcept(src.id);
        }

        function debouncedHandle(e) { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => handleChange(e), 80); }

        allInputs.forEach(inp => {
            inp.addEventListener('input', debouncedHandle);
            inp.addEventListener('focus', () => inp.select());
            inp.addEventListener('click', () => inp.select());
        });

        binInput.addEventListener('keypress', (e) => { if (!/[01]/.test(e.key) && e.key !== 'Backspace' && e.key !== 'Delete' && !e.ctrlKey) e.preventDefault(); });
        octInput.addEventListener('keypress', (e) => { if (!/[0-7]/.test(e.key) && e.key !== 'Backspace' && e.key !== 'Delete' && !e.ctrlKey) e.preventDefault(); });
        hexInput.addEventListener('keypress', (e) => { if (!/[0-9a-fA-F]/.test(e.key) && e.key !== 'Backspace' && e.key !== 'Delete' && !e.ctrlKey) e.preventDefault(); });

        // ---------- DIVISION STEPS ----------
        function computeSteps(num) {
            if (num === null || num === 0) return [];
            const steps = []; let n = num, cnt = 0;
            while (n > 0) {
                cnt++;
                const quotient = Math.floor(n / 2);
                const rem = n % 2;
                const fraction = (n / 2) - quotient;
                steps.push({ step: cnt, current: n, quotient, remainder: rem, fractionIgnored: fraction > 0 });
                n = quotient;
            }
            return steps;
        }

        function renderSteps(steps) {
            stepsContainer.innerHTML = '';
            if (!steps.length) {
                const msg = document.createElement('div'); msg.className = 'empty-message';
                msg.setAttribute('data-lang', 'emptySteps'); msg.textContent = t[currentLang].emptySteps;
                stepsContainer.appendChild(msg); return;
            }
            steps.forEach((s, idx) => {
                const card = document.createElement('div'); card.className = 'step-card';
                card.style.animationDelay = `${idx * 0.04}s`;
                const fracText = s.fractionIgnored ? t[currentLang].fractionIgnored : t[currentLang].noFraction;
                const remLabel = t[currentLang].recordedRemainder;
                card.innerHTML = `<div class="step-num">${s.step}</div>
                    <div class="step-expression"><span class="val">${s.current}</span> ÷ 2 = <span class="val">${s.quotient}</span> <span class="frac-text">(${fracText})</span></div>
                    <div class="step-remainder"><div class="rem-label">${remLabel}</div><div class="rem-value">${s.remainder}</div></div>`;
                stepsContainer.appendChild(card);
            });
        }

        function updateStepsUI() { renderSteps(computeSteps(currentDecimal)); }

        // ---------- TUTORIAL LOGIC ----------
        function padLeft(str, len, char = '0') { while (str.length < len) str = char + str; return str; }

        function binToOctalSteps(bin) {
            bin = bin.replace(/^0+/, '') || '0';
            const padded = bin.length % 3 === 0 ? bin : padLeft(bin, bin.length + (3 - bin.length % 3));
            const groups = [];
            for (let i = 0; i < padded.length; i += 3) groups.push(padded.substring(i, i + 3));
            const weights = [4, 2, 1];
            const result = groups.map(g => {
                let sum = 0;
                for (let i = 0; i < 3; i++) if (g[i] === '1') sum += weights[i];
                return { group: g, sum: sum.toString(8) };
            });
            return { padded, groups: result, weights, octal: result.map(r => r.sum).join('') };
        }

        function octalToBinSteps(oct) {
            const digits = oct.split('');
            const weights = [4, 2, 1];
            const result = digits.map(d => {
                const val = parseInt(d, 8);
                const bin = padLeft(val.toString(2), 3);
                return { digit: d, val, bin };
            });
            return { digits: result, weights, binary: result.map(r => r.bin).join('').replace(/^0+/, '') || '0' };
        }

        function binToHexSteps(bin) {
            bin = bin.replace(/^0+/, '') || '0';
            const padded = bin.length % 4 === 0 ? bin : padLeft(bin, bin.length + (4 - bin.length % 4));
            const groups = [];
            for (let i = 0; i < padded.length; i += 4) groups.push(padded.substring(i, i + 4));
            const weights = [8, 4, 2, 1];
            const hexDigits = '0123456789ABCDEF';
            const result = groups.map(g => {
                let sum = 0;
                for (let i = 0; i < 4; i++) if (g[i] === '1') sum += weights[i];
                return { group: g, sum: sum, hex: hexDigits[sum] };
            });
            return { padded, groups: result, weights, hex: result.map(r => r.hex).join('') };
        }

        function hexToBinSteps(hex) {
            const digits = hex.toUpperCase().split('');
            const hexDigits = '0123456789ABCDEF';
            const weights = [8, 4, 2, 1];
            const result = digits.map(d => {
                const val = hexDigits.indexOf(d);
                const bin = padLeft(val.toString(2), 4);
                return { digit: d, val, bin };
            });
            return { digits: result, weights, binary: result.map(r => r.bin).join('').replace(/^0+/, '') || '0' };
        }

        function renderTutorial() {
            if (currentDecimal === null) {
                tutorialDisplay.innerHTML = `<div class="empty-message">${t[currentLang].noTutorialData}</div>`;
                return;
            }
            const dec = currentDecimal;
            const bin = dec.toString(2);
            const oct = dec.toString(8);
            const hex = dec.toString(16).toUpperCase();
            let html = '';

            switch (tutorialMode) {
                case 'bin2oct': {
                    const data = binToOctalSteps(bin);
                    html += `<div style="margin-bottom:16px;font-weight:700;color:var(--accent);">(${bin})₂ → (${data.octal})₈</div>`;
                    html += `<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;">`;
                    html += `<span style="color:var(--muted);">${t[currentLang].weight421}:</span>`;
                    data.weights.forEach(w => html += `<span class="weight-cell header">${w}</span>`);
                    html += `</div>`;
                    data.groups.forEach((g, i) => {
                        html += `<div class="step-row" style="animation-delay:${i*0.2}s;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">`;
                        html += `<span class="step-num" style="width:24px;height:24px;font-size:0.7rem;">${i+1}</span>`;
                        html += `<span class="group-bracket">`;
                        g.group.split('').forEach(ch => html += `<span class="digit-cell ${ch==='1'?'highlight':''}">${ch}</span>`);
                        html += `</span>`;
                        html += `<span class="arrow">→</span>`;
                        html += `<span class="result-box">${g.sum}</span>`;
                        html += `</div>`;
                    });
                    html += `<div style="margin-top:12px;color:var(--success);font-weight:700;">${t[currentLang].result}: ${data.octal}</div>`;
                    break;
                }
                case 'oct2bin': {
                    const data = octalToBinSteps(oct);
                    html += `<div style="margin-bottom:16px;font-weight:700;color:var(--accent);">(${oct})₈ → (${data.binary})₂</div>`;
                    html += `<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;">`;
                    html += `<span style="color:var(--muted);">${t[currentLang].weight421}:</span>`;
                    data.weights.forEach(w => html += `<span class="weight-cell header">${w}</span>`);
                    html += `</div>`;
                    data.digits.forEach((d, i) => {
                        html += `<div class="step-row" style="animation-delay:${i*0.2}s;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">`;
                        html += `<span class="step-num" style="width:24px;height:24px;font-size:0.7rem;">${i+1}</span>`;
                        html += `<span class="digit-cell highlight">${d.digit}</span>`;
                        html += `<span class="arrow">→</span>`;
                        html += `<span class="group-bracket">`;
                        d.bin.split('').forEach(ch => html += `<span class="digit-cell ${ch==='1'?'highlight':''}">${ch}</span>`);
                        html += `</span>`;
                        html += `</div>`;
                    });
                    html += `<div style="margin-top:12px;color:var(--success);font-weight:700;">${t[currentLang].result}: ${data.binary}</div>`;
                    break;
                }
                case 'bin2hex': {
                    const data = binToHexSteps(bin);
                    html += `<div style="margin-bottom:16px;font-weight:700;color:var(--accent);">(${bin})₂ → (${data.hex})₁₆</div>`;
                    html += `<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;">`;
                    html += `<span style="color:var(--muted);">${t[currentLang].weight8421}:</span>`;
                    data.weights.forEach(w => html += `<span class="weight-cell header">${w}</span>`);
                    html += `</div>`;
                    data.groups.forEach((g, i) => {
                        html += `<div class="step-row" style="animation-delay:${i*0.2}s;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">`;
                        html += `<span class="step-num" style="width:24px;height:24px;font-size:0.7rem;">${i+1}</span>`;
                        html += `<span class="group-bracket">`;
                        g.group.split('').forEach(ch => html += `<span class="digit-cell ${ch==='1'?'highlight':''}">${ch}</span>`);
                        html += `</span>`;
                        html += `<span class="arrow">→</span>`;
                        html += `<span class="result-box">${g.sum} = ${g.hex}</span>`;
                        html += `</div>`;
                    });
                    html += `<div style="margin-top:12px;color:var(--success);font-weight:700;">${t[currentLang].result}: ${data.hex}</div>`;
                    break;
                }
                case 'hex2bin': {
                    const data = hexToBinSteps(hex);
                    html += `<div style="margin-bottom:16px;font-weight:700;color:var(--accent);">(${hex})₁₆ → (${data.binary})₂</div>`;
                    html += `<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;">`;
                    html += `<span style="color:var(--muted);">${t[currentLang].weight8421}:</span>`;
                    data.weights.forEach(w => html += `<span class="weight-cell header">${w}</span>`);
                    html += `</div>`;
                    data.digits.forEach((d, i) => {
                        html += `<div class="step-row" style="animation-delay:${i*0.2}s;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">`;
                        html += `<span class="step-num" style="width:24px;height:24px;font-size:0.7rem;">${i+1}</span>`;
                        html += `<span class="digit-cell highlight">${d.digit} (${d.val})</span>`;
                        html += `<span class="arrow">→</span>`;
                        html += `<span class="group-bracket">`;
                        d.bin.split('').forEach(ch => html += `<span class="digit-cell ${ch==='1'?'highlight':''}">${ch}</span>`);
                        html += `</span>`;
                        html += `</div>`;
                    });
                    html += `<div style="margin-top:12px;color:var(--success);font-weight:700;">${t[currentLang].result}: ${data.binary}</div>`;
                    break;
                }
                case 'dec2bin': {
                    const steps = computeSteps(dec);
                    html += `<div style="margin-bottom:16px;font-weight:700;color:var(--accent);">(${dec})₁₀ → (${bin})₂</div>`;
                    html += `<div style="color:var(--muted);margin-bottom:8px;">Repeated division by 2 (remainders read bottom-up):</div>`;
                    steps.forEach((s, i) => {
                        html += `<div class="step-row" style="animation-delay:${i*0.2}s;">`;
                        html += `<span class="step-num" style="width:24px;height:24px;font-size:0.7rem;">${s.step}</span>`;
                        html += `<span>${s.current} ÷ 2 = ${s.quotient} </span>`;
                        html += `<span style="color:var(--warning);font-weight:700;">remainder ${s.remainder}</span>`;
                        html += `</div>`;
                    });
                    html += `<div style="margin-top:12px;color:var(--success);font-weight:700;">Read remainders from bottom to top: ${bin}</div>`;
                    break;
                }
                case 'bin2dec': {
                    const bits = bin.split('').reverse();
                    html += `<div style="margin-bottom:16px;font-weight:700;color:var(--accent);">(${bin})₂ → (${dec})₁₀</div>`;
                    html += `<div style="color:var(--muted);margin-bottom:8px;">Multiply each bit by 2^position:</div>`;
                    bits.forEach((bit, pos) => {
                        if (bit === '1') {
                            const val = Math.pow(2, pos);
                            html += `<div class="step-row" style="animation-delay:${pos*0.15}s;">`;
                            html += `<span>1 × 2^${pos} = ${val}</span>`;
                            html += `</div>`;
                        }
                    });
                    html += `<div style="margin-top:12px;color:var(--success);font-weight:700;">Sum = ${dec}</div>`;
                    break;
                }
            }
            tutorialDisplay.innerHTML = html;
        }

        // ---------- TUTORIAL CONTROLS ----------
        tutorialToggle.addEventListener('click', () => {
            tutorialContent.classList.toggle('show');
            tutorialToggle.classList.toggle('open');
            if (tutorialContent.classList.contains('show')) renderTutorial();
        });

        tutorialButtons.addEventListener('click', (e) => {
            if (e.target.classList.contains('tutorial-btn')) {
                tutorialButtons.querySelectorAll('.tutorial-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                tutorialMode = e.target.dataset.mode;
                renderTutorial();
            }
        });

        // ---------- INIT ----------
        function init() {
            setLanguage(localStorage.getItem('lang') || 'en');
            currentDecimal = 13;
            fillAllFields(13);
            updateStepsUI();
            tutorialContent.classList.add('show');
            tutorialToggle.classList.add('open');
            renderTutorial();
        }

        init();
    })();
</script>
</body>
</html>
